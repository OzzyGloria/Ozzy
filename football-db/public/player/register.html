<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player Register — ScoutBase</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><div class="logo-icon">⚽</div> ScoutBase</a>
    <div class="nav-links">
      <a href="/player/login.html">Already have an account?</a>
      <div id="nav-user"></div>
    </div>
  </div>
</nav>

<div class="page-center">
  <div class="auth-card">
    <h1>Create your player profile</h1>
    <p class="subtitle">Get discovered by scouts and sporting directors worldwide.</p>

    <div id="alert" class="alert" style="display:none;"></div>

    <form id="register-form">
      <div class="form-group">
        <label>Full name</label>
        <input class="form-control" type="text" name="full_name" placeholder="e.g. Marcus Johnson" required />
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input class="form-control" type="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="At least 8 characters" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
        Create account →
      </button>
    </form>

    <div class="auth-divider">Already have an account? <a href="/player/login.html">Sign in</a></div>
    <div class="auth-divider" style="margin-top:4px;">Are you a scout? <a href="/scout/register.html">Scout sign up</a></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const alert = document.getElementById('alert');
  clearAlert(alert);
  btn.disabled = true;
  btn.textContent = 'Creating account…';

  const fd = new FormData(e.target);
  try {
    const { token: tok, user } = await Auth.register({
      email: fd.get('email'),
      password: fd.get('password'),
      full_name: fd.get('full_name'),
      role: 'player'
    });
    setToken(tok);
    setUser(user);
    window.location.href = '/player/dashboard.html';
  } catch (err) {
    showError(alert, err.error || 'Registration failed. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create account →';
  }
});
</script>
</body>
</html>
