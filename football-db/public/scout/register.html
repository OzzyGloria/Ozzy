<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout Register — ScoutBase</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><div class="logo-icon">⚽</div> ScoutBase</a>
    <div class="nav-links">
      <a href="/scout/login.html">Already have an account?</a>
      <div id="nav-user"></div>
    </div>
  </div>
</nav>

<div class="page-center">
  <div class="auth-card">
    <h1>Scout / Director sign up</h1>
    <p class="subtitle">Create your account then choose a membership to access the full player database.</p>

    <div id="alert" class="alert" style="display:none;"></div>

    <form id="register-form">
      <div class="form-group">
        <label>Full name</label>
        <input class="form-control" type="text" name="full_name" placeholder="e.g. Sarah Williams" required />
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input class="form-control" type="email" name="email" placeholder="you@club.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-control" type="password" name="password" placeholder="At least 8 characters" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Organisation / Club</label>
          <input class="form-control" type="text" name="organisation" placeholder="e.g. FC United" />
        </div>
        <div class="form-group">
          <label>Your title</label>
          <select class="form-control" name="scout_title">
            <option value="">Select role</option>
            <option>Head of Recruitment</option>
            <option>Sporting Director</option>
            <option>Chief Scout</option>
            <option>Scout</option>
            <option>Technical Director</option>
            <option>Academy Scout</option>
            <option>Agent</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn btn-gold btn-full btn-lg" id="submit-btn">
        Create scout account →
      </button>
    </form>

    <div class="auth-divider">Already have an account? <a href="/scout/login.html">Sign in</a></div>
    <div class="auth-divider" style="margin-top:4px;">Are you a player? <a href="/player/register.html">Player sign up</a></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const alert = document.getElementById('alert');
  clearAlert(alert);
  btn.disabled = true;
  btn.textContent = 'Creating account…';

  const fd = new FormData(e.target);
  try {
    const { token: tok, user } = await Auth.register({
      email: fd.get('email'),
      password: fd.get('password'),
      full_name: fd.get('full_name'),
      role: 'scout',
      organisation: fd.get('organisation'),
      scout_title: fd.get('scout_title')
    });
    setToken(tok);
    setUser(user);
    window.location.href = '/scout/dashboard.html';
  } catch (err) {
    showError(alert, err.error || 'Registration failed. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create scout account →';
  }
});
</script>
</body>
</html>
